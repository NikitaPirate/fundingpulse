x-app-env: &app-env
  env_file:
    - .env

services:
  timescaledb:
    image: timescale/timescaledb:2.23.0-pg18
    container_name: fundingpulse-db
    restart: unless-stopped
    command: postgres -c max_locks_per_transaction=512 -c shared_buffers=256MB -c max_connections=200
    environment:
      POSTGRES_DB: ${DB_DBNAME:?DB_DBNAME is required}
      POSTGRES_USER: ${DB_USER:?DB_USER is required}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
    networks:
      - funding
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  db-migrate:
    <<: *app-env
    build:
      context: .
      dockerfile: deploy/backend.Dockerfile
      target: migrate
    container_name: fundingpulse-migrate
    restart: "no"
    environment:
      DB_HOST: timescaledb
    networks:
      - funding
    depends_on:
      timescaledb:
        condition: service_healthy

  tracker:
    <<: *app-env
    build:
      context: .
      dockerfile: deploy/backend.Dockerfile
      target: tracker
    container_name: fundingpulse-tracker
    restart: unless-stopped
    environment:
      DB_HOST: timescaledb
      FT_INSTANCE_COUNT: ${FT_INSTANCE_COUNT:-3}
    networks:
      - funding
    depends_on:
      db-migrate:
        condition: service_completed_successfully

  api:
    <<: *app-env
    build:
      context: .
      dockerfile: deploy/backend.Dockerfile
      target: api
    container_name: fundingpulse-api
    restart: unless-stopped
    environment:
      DB_HOST: timescaledb
    networks:
      - funding
    depends_on:
      db-migrate:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2).read()",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    ports:
      - "${API_PORT:-8000}:8000"

networks:
  funding:

volumes:
  timescaledb_data:
