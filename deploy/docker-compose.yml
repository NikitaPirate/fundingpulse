# Run from the project root so compose picks up the sibling .env automatically:
#   docker compose -f deploy/docker-compose.yml --env-file .env up
# Or cd into deploy/ and symlink/copy .env there — compose needs an env file
# next to the compose file for ${VAR} host-side substitution, and a second copy
# inside containers via env_file. We keep a single source of truth by pointing
# env_file at ../.env; host-side ${VAR}s below come from --env-file.
x-app-env: &app-env
  env_file:
    - ../.env
  # Docker-specific overrides only — everything else comes from ../.env.
  environment:
    DB_HOST: timescaledb

services:
  timescaledb:
    image: timescale/timescaledb:2.23.0-pg18
    container_name: fundingpulse-db
    restart: unless-stopped
    command: postgres -c max_locks_per_transaction=512 -c shared_buffers=256MB -c max_connections=200
    environment:
      POSTGRES_DB: ${DB_DBNAME:?DB_DBNAME is required}
      POSTGRES_USER: ${DB_USER:?DB_USER is required}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  db-migrate:
    <<: *app-env
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      target: migrate
    container_name: fundingpulse-migrate
    restart: "no"
    depends_on:
      timescaledb:
        condition: service_healthy

  tracker:
    <<: *app-env
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      target: tracker
    container_name: fundingpulse-tracker
    restart: unless-stopped
    environment:
      DB_HOST: timescaledb
      FT_INSTANCE_COUNT: ${FT_INSTANCE_COUNT:-3}
    depends_on:
      db-migrate:
        condition: service_completed_successfully

  api:
    <<: *app-env
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      target: api
    container_name: fundingpulse-api
    restart: unless-stopped
    depends_on:
      db-migrate:
        condition: service_completed_successfully
    ports:
      - "${API_PORT:-8000}:8000"

volumes:
  timescaledb_data:
    driver: local
