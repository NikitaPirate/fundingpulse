services:
  timescaledb:
    image: timescale/timescaledb:2.23.0-pg18
    container_name: fundingpulse-db
    restart: unless-stopped
    command: postgres -c max_locks_per_transaction=512 -c shared_buffers=256MB -c max_connections=200
    environment:
      POSTGRES_DB: ${DB_DBNAME:?DB_DBNAME is required}
      POSTGRES_USER: ${DB_USER:?DB_USER is required}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  db-migrate:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      target: migrate
    container_name: fundingpulse-migrate
    restart: on-failure
    depends_on:
      timescaledb:
        condition: service_healthy
    env_file:
      - ../.env
    environment:
      DB_HOST: ${DB_HOST:?DB_HOST is required}
      DB_PORT: ${DB_PORT:?DB_PORT is required}
      DB_USER: ${DB_USER:?DB_USER is required}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      DB_DBNAME: ${DB_DBNAME:?DB_DBNAME is required}

  tracker:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      target: tracker
    container_name: fundingpulse-tracker
    restart: unless-stopped
    depends_on:
      db-migrate:
        condition: service_completed_successfully
    environment:
      DB_HOST: ${DB_HOST:?DB_HOST is required}
      DB_PORT: ${DB_PORT:?DB_PORT is required}
      DB_USER: ${DB_USER:?DB_USER is required}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      DB_DBNAME: ${DB_DBNAME:?DB_DBNAME is required}
      EXCHANGES: ${EXCHANGES:-}
      DEBUG_EXCHANGES: ${DEBUG_EXCHANGES:-}
      INSTANCE_COUNT: ${INSTANCE_COUNT:-3}
    env_file:
      - ../.env

  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      target: api
    container_name: fundingpulse-api
    restart: unless-stopped
    depends_on:
      db-migrate:
        condition: service_completed_successfully
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      DB_HOST: ${DB_HOST:?DB_HOST is required}
      DB_PORT: ${DB_PORT:?DB_PORT is required}
      DB_USER: ${DB_USER:?DB_USER is required}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      DB_DBNAME: ${DB_DBNAME:?DB_DBNAME is required}
    env_file:
      - ../.env

volumes:
  timescaledb_data:
    driver: local
