default_language_version:
  python: python3.14

repos:
  - repo: local
    hooks:
      - id: no-direct-datetime
        name: no-direct-datetime
        entry: uv run python scripts/check_no_datetime_usage.py
        language: system
        types: [python]
      - id: pyright
        name: pyright
        entry: uv run pyright
        language: system
        types: [python]
        pass_filenames: false

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.9
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-added-large-files
      - id: check-case-conflict
      - id: check-merge-conflict
      - id: check-toml
      - id: check-yaml
        exclude: ^(mkdocs\.yml|docker-compose\.prod\.yml)$
      - id: debug-statements
      - id: end-of-file-fixer
      - id: trailing-whitespace
